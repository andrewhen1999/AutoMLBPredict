name: Update MLB Predictions

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install Dependencies
        run: |
          pip install -r MLBPredict/files/requirements.txt

      - name: Run Today's Games Script
        run: |
          python MLBPredict/data/today_game.py

      - name: Commit Updated today game CSV
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add MLBPredict/data/upcoming_games.csv
          git diff --staged --quiet || git commit -m "Update today game"
          git push

      - name: Run Prediction Script
        run: |
          python MLBPredict/files/predict.py

      - name: Commit Updated CSV
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add MLBPredict/output/predictions.csv
          git diff --staged --quiet || git commit -m "Update predictions"
          git push
